  alex-platform-v2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: alex-platform-v2:latest
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - PORT=${PORT:-8080}
      - WS_URL=${WS_URL:-ws://0.0.0.0:8080/ws}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5-coder:7b}
    depends_on:
      - wireguard
      - ollama
    networks:
      - app-net
    cap_add:
      - NET_ADMIN
