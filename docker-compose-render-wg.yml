version: '3.9'

services:
  # Backend da Alex Platform v2 com suporte a WebSocket
  alex-platform-v2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: alex-platform-v2:latest
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - PORT=${PORT:-8080}
      - WS_URL=${WS_URL:-ws://0.0.0.0:8080/ws}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5-coder:7b}
    depends_on:
      - wireguard
      - ollama
    networks:
      - app-net
    cap_add:
      - NET_ADMIN

  # Cliente WireGuard (conecta ao servidor WireGuard local)
  wireguard:
    image: linuxserver/wireguard:latest
    container_name: wg-client
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - ./wireguard-config:/config
      - /lib/modules:/lib/modules
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped
    networks:
      - app-net
    dns:
      - 8.8.8.8
      - 8.8.4.4

  # Ollama com pull automático do modelo
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    command: >
      sh -c "ollama pull qwen2.5-coder:7b && ollama serve"
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  ollama-data:
